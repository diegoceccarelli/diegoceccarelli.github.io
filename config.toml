title = "Diego Ceccarelli"
baseURL = "https://diegoceccarelli.github.io"
publishDir = "docs"
theme = "researcher"
disableKinds = ["taxonomy", "term"]
enableEmoji = true
math = false          # enable KaTeX (https://katex.org/) globally
googleAnalytics = ""  # add your tracking id

[params]
  author = "Diego Ceccarelli"
  description = "Diego Ceccarelli is an AI Engineering Manager at Bloomberg in London, UK, leading teams building production LLM applications, agentic search, and retrieval systems. PhD in Information Retrieval."
  favicon = "favicon.ico"  # path to a .ico to use as favicon
  [params.footer]
    text = "Template by Olivier Roques"
    url = "https://github.com/ojroques/hugo-researcher"

[permalinks]
  "/" = "/:contentbasename"

[menu]
  [[menu.main]]
    name = "About"
    url = "/about"
    weight = 1
  [[menu.main]]
    name = "Snippets"
    url = "/snippets"
    weight = 1

[markup.goldmark.renderer]
  unsafe = true  # allow raw HTML in markdown files
